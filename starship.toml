add_newline = false

# dir, (conda), git branch, prompt char
format = "$directory$conda$git_branch$character"

[directory]
truncate_to_repo = true
truncation_length = 3

[conda]
format = " [$environment]($style)"

[git_branch]
format = " [$branch]($style)"
only_attached = true

[git_status]
disabled = true

[character]
success_symbol = "❯ "
error_symbol = "❯ "
